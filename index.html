<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Central Teknik Rekatama</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  background: url('background.png') no-repeat center center;
  background-size: cover;
  background-attachment: fixed;
  text-align: center;
  color: white;
}

.overlay {
  background: rgba(0, 0, 0, 0.6);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  padding: 20px;
}

h1 {
  font-size: 52px;
  margin-bottom: 20px;
  background: linear-gradient(90deg, #00f2fe, #4facfe, #43e97b);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

p {
  font-size: 20px;
  margin-bottom: 30px;
}

.button {
  display: inline-block;
  padding: 15px 30px;
  background: #25D366;
  color: white;
  text-decoration: none;
  border-radius: 50px;
  font-size: 18px;
  font-weight: bold;
  margin: 10px;
  transition: 0.3s;
}

.button:hover {
  transform: scale(1.05);
}

.maps-btn {
  background: #4285F4;
}

.footer {
  position: absolute;
  bottom: 20px;
  font-size: 14px;
  opacity: 0.8;
}
</style>
</head>

<body>

<div class="overlay">

  </div>
